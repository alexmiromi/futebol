<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#16213e">
<title>Futebol 7</title>
<style>
:root {
  --bg: #1a1a2e;
  --card: #16213e;
  --accent: #0f3460;
  --highlight: #e94560;
  --green: #2ecc71;
  --text: #eee;
  --muted: #8899aa;
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  padding-bottom: env(safe-area-inset-bottom, 20px);
}
.container { max-width: 500px; margin: 0 auto; padding: 16px; }
header { text-align: center; padding: 20px 0 10px; }
header h1 { font-size: 1.5rem; }
header p { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }
.tabs { display: flex; gap: 4px; margin: 16px 0; background: var(--card); border-radius: var(--radius); padding: 4px; }
.tab { flex: 1; padding: 10px 6px; border: none; background: transparent; color: var(--muted); font-size: 0.82rem; font-weight: 600; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
.tab.active { background: var(--accent); color: #fff; }
.panel { display: none; }
.panel.active { display: block; }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 4px; font-weight: 600; }
input[type="text"], input[type="tel"], select { width: 100%; padding: 12px; border: 2px solid var(--accent); border-radius: 8px; background: var(--card); color: var(--text); font-size: 1rem; outline: none; transition: border-color 0.2s; }
input:focus, select:focus { border-color: var(--highlight); }
.positions-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.pos-chip { padding: 8px 12px; border-radius: 20px; background: var(--card); border: 2px solid var(--accent); color: var(--muted); font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: all 0.2s; user-select: none; }
.pos-chip.selected { background: var(--accent); border-color: var(--highlight); color: #fff; }
.skill-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.skill-row label { width: 90px; font-size: 0.8rem; color: var(--muted); font-weight: 600; flex-shrink: 0; }
.skill-row input[type="range"] { flex: 1; accent-color: var(--highlight); height: 6px; }
.skill-val { width: 28px; text-align: center; font-weight: 700; font-size: 0.95rem; }
.btn { width: 100%; padding: 14px; border: none; border-radius: var(--radius); font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-top: 8px; }
.btn-primary { background: var(--highlight); color: #fff; }
.btn-primary:active { transform: scale(0.97); }
.btn-secondary { background: var(--accent); color: #fff; }
.btn-green { background: var(--green); color: #fff; }
.btn-small { width: auto; padding: 8px 16px; font-size: 0.85rem; margin: 0; }
.btn-outline { background: transparent; border: 2px solid var(--accent); color: var(--muted); }
.player-card { background: var(--card); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; transition: all 0.2s; position: relative; }
.player-card.confirmed { border-left: 4px solid var(--green); }
.player-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.1rem; flex-shrink: 0; }
.player-info { flex: 1; min-width: 0; }
.player-name { font-weight: 700; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.player-meta { color: var(--muted); font-size: 0.75rem; margin-top: 2px; }
.player-overall { font-weight: 800; font-size: 1.2rem; color: var(--highlight); margin-right: 4px; }
.player-actions { display: flex; gap: 6px; flex-shrink: 0; }
.icon-btn { width: 36px; height: 36px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 1rem; cursor: pointer; transition: all 0.15s; }
.icon-btn:active { transform: scale(0.9); }
.icon-btn.edit { background: var(--accent); color: var(--text); }
.icon-btn.delete { background: #3a1525; color: var(--highlight); }
.icon-btn.confirm { background: #1a3a25; color: var(--green); }
.icon-btn.confirmed { background: var(--green); color: #fff; }
.team-block { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; }
.team-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.team-title { font-weight: 800; font-size: 1.1rem; }
.team-overall { font-size: 0.85rem; color: var(--muted); }
.team-player { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
.team-player:last-child { border-bottom: none; }
.team-player-pos { color: var(--muted); font-size: 0.75rem; font-weight: 700; margin-right: 6px; }
.team-player-rating { font-weight: 700; color: var(--highlight); }
.team-player.bench { opacity: 0.6; }
.team-player.bench .team-player-pos { color: #f39c12; }
.team-separator { border: none; border-top: 1px dashed rgba(255,255,255,0.15); margin: 8px 0; }
.config-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
.config-row label { font-size: 0.9rem; }
.config-row input[type="number"] { width: 70px; padding: 8px; border: 2px solid var(--accent); border-radius: 8px; background: var(--card); color: var(--text); font-size: 1rem; text-align: center; outline: none; }
.config-row input[type="number"]:focus { border-color: var(--highlight); }
.weight-section { margin-top: 16px; }
.weight-section h3 { font-size: 0.9rem; color: var(--muted); margin-bottom: 12px; }
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--green); color: #fff; padding: 12px 24px; border-radius: 30px; font-weight: 700; font-size: 0.9rem; transition: transform 0.3s; z-index: 999; }
.toast.show { transform: translateX(-50%) translateY(0); }
.empty { text-align: center; padding: 40px 20px; color: var(--muted); }
.search-bar { margin-bottom: 12px; }
.search-bar input { width: 100%; padding: 10px 14px; border: 2px solid var(--accent); border-radius: 30px; background: var(--card); color: var(--text); font-size: 0.9rem; outline: none; }
.search-bar input::placeholder { color: var(--muted); }
.search-bar input:focus { border-color: var(--highlight); }
.counter { display: inline-block; background: var(--highlight); color: #fff; border-radius: 10px; padding: 2px 8px; font-size: 0.7rem; font-weight: 700; margin-left: 4px; vertical-align: middle; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: flex-end; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: var(--bg); width: 100%; max-width: 500px; max-height: 90dvh; overflow-y: auto; border-radius: 20px 20px 0 0; padding: 20px 16px calc(20px + env(safe-area-inset-bottom, 0px)); }
.modal-handle { width: 40px; height: 4px; background: var(--accent); border-radius: 4px; margin: 0 auto 16px; }
.modal h2 { font-size: 1.1rem; margin-bottom: 16px; }
.confirm-bar { display: flex; gap: 8px; margin-bottom: 12px; }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Futebol 7</h1>
    <p>Organize peladas e sorteie times equilibrados</p>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="jogadores">Jogadores</button>
    <button class="tab" data-tab="confirmados">Confirmados <span id="confirmed-count" class="counter">0</span></button>
    <button class="tab" data-tab="times">Times</button>
    <button class="tab" data-tab="config">Config</button>
  </div>

  <!-- JOGADORES -->
  <div id="panel-jogadores" class="panel active">
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Buscar jogador...">
    </div>
    <div id="players-list"></div>
    <button class="btn btn-primary" onclick="openModal()">+ Cadastrar Jogador</button>
  </div>

  <!-- CONFIRMADOS -->
  <div id="panel-confirmados" class="panel">
    <div class="confirm-bar">
      <button class="btn btn-small btn-secondary" onclick="confirmAll()">Confirmar Todos</button>
      <button class="btn btn-small btn-outline" onclick="unconfirmAll()">Desmarcar Todos</button>
    </div>
    <div id="confirmed-list"></div>
  </div>

  <!-- TIMES -->
  <div id="panel-times" class="panel">
    <button class="btn btn-primary" onclick="generateTeams()" style="margin-bottom:14px">Sortear Times</button>
    <button class="btn btn-secondary" onclick="generateTeams()" id="btn-reshuffle" style="display:none;margin-bottom:14px">Sortear Novamente</button>
    <div id="teams-display"></div>
    <button class="btn btn-green" onclick="copyTeams()" id="btn-copy" style="display:none">Copiar para WhatsApp</button>
  </div>

  <!-- CONFIG -->
  <div id="panel-config" class="panel">
    <div class="config-row">
      <label>Numero de times</label>
      <input type="number" id="cfg-num-teams" min="2" max="8" value="2">
    </div>
    <div class="config-row">
      <label><strong>Total por time</strong></label>
      <input type="number" id="cfg-per-team" min="2" max="15" value="7">
    </div>

    <div class="weight-section">
      <h3>Maximo por posicao (por time)</h3>
      <div class="config-row">
        <label>Goleiro</label>
        <input type="number" id="cfg-pos-Goleiro" min="0" max="5" value="1">
      </div>
      <div class="config-row">
        <label>Zagueiro</label>
        <input type="number" id="cfg-pos-Zagueiro" min="0" max="5" value="2">
      </div>
      <div class="config-row">
        <label>Lateral Esquerdo</label>
        <input type="number" id="cfg-pos-Lateral Esquerdo" min="0" max="5" value="1">
      </div>
      <div class="config-row">
        <label>Lateral Direito</label>
        <input type="number" id="cfg-pos-Lateral Direito" min="0" max="5" value="1">
      </div>
      <div class="config-row">
        <label>Volante</label>
        <input type="number" id="cfg-pos-Volante" min="0" max="5" value="2">
      </div>
      <div class="config-row">
        <label>Meia</label>
        <input type="number" id="cfg-pos-Meia" min="0" max="5" value="2">
      </div>
      <div class="config-row">
        <label>Atacante</label>
        <input type="number" id="cfg-pos-Atacante" min="0" max="5" value="2">
      </div>
      <div class="config-row">
        <label>Ponta</label>
        <input type="number" id="cfg-pos-Ponta" min="0" max="5" value="2">
      </div>
    </div>

    <div class="weight-section">
      <h3>Peso das competencias no balanceamento</h3>
      <div class="skill-row">
        <label>Velocidade</label>
        <input type="range" min="0" max="10" value="5" data-weight="velocidade">
        <span class="skill-val">5</span>
      </div>
      <div class="skill-row">
        <label>Forca</label>
        <input type="range" min="0" max="10" value="5" data-weight="forca">
        <span class="skill-val">5</span>
      </div>
      <div class="skill-row">
        <label>Ataque</label>
        <input type="range" min="0" max="10" value="5" data-weight="ataque">
        <span class="skill-val">5</span>
      </div>
      <div class="skill-row">
        <label>Defesa</label>
        <input type="range" min="0" max="10" value="5" data-weight="defesa">
        <span class="skill-val">5</span>
      </div>
      <div class="skill-row">
        <label>Tatico</label>
        <input type="range" min="0" max="10" value="5" data-weight="tatico">
        <span class="skill-val">5</span>
      </div>
      <div class="skill-row">
        <label>Posse de bola</label>
        <input type="range" min="0" max="10" value="5" data-weight="posse">
        <span class="skill-val">5</span>
      </div>
      <div class="skill-row">
        <label>Toque</label>
        <input type="range" min="0" max="10" value="5" data-weight="toque">
        <span class="skill-val">5</span>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modal-title">Cadastrar Jogador</h2>
    <div class="form-group">
      <label>Nome</label>
      <input type="text" id="inp-name" placeholder="Nome do jogador" autocomplete="off">
    </div>
    <div class="form-group">
      <label>Telefone</label>
      <input type="tel" id="inp-phone" placeholder="(99) 99999-9999" autocomplete="off">
    </div>
    <div class="form-group">
      <label>Posicoes</label>
      <div class="positions-grid" id="pos-grid"></div>
    </div>
    <h3 style="font-size:0.9rem;color:var(--muted);margin:16px 0 12px;">Competencias</h3>
    <div id="skills-form"></div>
    <button class="btn btn-primary" onclick="savePlayer()">Salvar</button>
    <button class="btn btn-outline" onclick="closeModal()" style="margin-top:8px">Cancelar</button>
  </div>
</div>

<div class="toast" id="toast">Copiado!</div>

<script>
const POSITIONS = ['Goleiro','Zagueiro','Lateral Esquerdo','Lateral Direito','Volante','Meia','Atacante','Ponta'];
const POS_ABBR = {
  'Goleiro':'GOL','Zagueiro':'ZAG',
  'Lateral Esquerdo':'LAT-E','Lateral Direito':'LAT-D',
  'Volante':'VOL','Meia':'MEI','Atacante':'ATA','Ponta':'PON',
  'Linha':'LIN','BANCO':'BANCO'
};
const POS_ORDER = {};
POSITIONS.forEach((p,i) => POS_ORDER[p] = i);
POS_ORDER['Linha'] = 50;
POS_ORDER['BANCO'] = 99;

const SKILLS = [
  {key:'velocidade', label:'Velocidade'},
  {key:'forca', label:'Forca'},
  {key:'ataque', label:'Ataque'},
  {key:'defesa', label:'Defesa'},
  {key:'tatico', label:'Tatico'},
  {key:'posse', label:'Posse de bola'},
  {key:'toque', label:'Toque'}
];

// ---- STATE ----
let players = JSON.parse(localStorage.getItem('fut_players') || '[]');

// Migrate old "Lateral" -> keep as-is, user can re-edit
let config = JSON.parse(localStorage.getItem('fut_config') || 'null') || {
  numTeams: 2,
  perTeam: 7,
  posLimits: {'Goleiro':1,'Zagueiro':2,'Lateral Esquerdo':1,'Lateral Direito':1,'Volante':2,'Meia':2,'Atacante':2,'Ponta':2},
  weights: {velocidade:5, forca:5, ataque:5, defesa:5, tatico:5, posse:5, toque:5}
};
// Migration: if old config has "Lateral" split it
if (config.posLimits && config.posLimits['Lateral'] !== undefined) {
  config.posLimits['Lateral Esquerdo'] = config.posLimits['Lateral Esquerdo'] || 1;
  config.posLimits['Lateral Direito'] = config.posLimits['Lateral Direito'] || 1;
  delete config.posLimits['Lateral'];
  // Also migrate player positions
  players.forEach(p => {
    if (p.positions && p.positions.includes('Lateral')) {
      p.positions = p.positions.filter(x => x !== 'Lateral');
      if (!p.positions.includes('Lateral Esquerdo')) p.positions.push('Lateral Esquerdo');
      if (!p.positions.includes('Lateral Direito')) p.positions.push('Lateral Direito');
    }
  });
}
if (!config.posLimits) config.posLimits = {'Goleiro':1,'Zagueiro':2,'Lateral Esquerdo':1,'Lateral Direito':1,'Volante':2,'Meia':2,'Atacante':2,'Ponta':2};
if (!config.perTeam) config.perTeam = 7;

let editingId = null;
let lastTeams = null;

function save() {
  localStorage.setItem('fut_players', JSON.stringify(players));
  localStorage.setItem('fut_config', JSON.stringify(config));
}
save(); // persist migration

// ---- TABS ----
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('panel-' + t.dataset.tab).classList.add('active');
    if (t.dataset.tab === 'confirmados') renderConfirmed();
    if (t.dataset.tab === 'jogadores') renderPlayers();
  });
});

// ---- OVERALL ----
function calcOverall(p) {
  const w = config.weights;
  let totalW = 0, totalV = 0;
  SKILLS.forEach(s => {
    const weight = w[s.key] || 1;
    totalW += weight;
    totalV += (p.skills?.[s.key] || 5) * weight;
  });
  return totalW > 0 ? Math.round(totalV / totalW * 10) : 50;
}

// ---- RENDER PLAYERS ----
function renderPlayers(filter = '') {
  const list = document.getElementById('players-list');
  const filtered = players.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()));
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty"><p>${filter ? 'Nenhum jogador encontrado' : 'Nenhum jogador cadastrado ainda'}</p></div>`;
    return;
  }
  list.innerHTML = filtered.map(p => {
    const initials = p.name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    const ovr = calcOverall(p);
    const posStr = (p.positions || []).map(x => POS_ABBR[x] || x).join(', ');
    return `<div class="player-card ${p.confirmed ? 'confirmed' : ''}">
      <div class="player-avatar">${initials}</div>
      <div class="player-info">
        <div class="player-name">${esc(p.name)}</div>
        <div class="player-meta">${esc(posStr)}${p.phone ? ' | ' + esc(p.phone) : ''}</div>
      </div>
      <span class="player-overall">${ovr}</span>
      <div class="player-actions">
        <button class="icon-btn confirm ${p.confirmed ? 'confirmed' : ''}" onclick="toggleConfirm('${p.id}')">&#10003;</button>
        <button class="icon-btn edit" onclick="editPlayer('${p.id}')">&#9998;</button>
        <button class="icon-btn delete" onclick="deletePlayer('${p.id}')">&#10005;</button>
      </div>
    </div>`;
  }).join('');
  updateConfirmedCount();
}

function renderConfirmed() {
  const list = document.getElementById('confirmed-list');
  const confirmed = players.filter(p => p.confirmed);
  if (confirmed.length === 0) {
    list.innerHTML = `<div class="empty"><p>Nenhum jogador confirmado.<br>Confirme na aba Jogadores.</p></div>`;
    return;
  }
  list.innerHTML = confirmed.map(p => {
    const initials = p.name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    const ovr = calcOverall(p);
    const posStr = (p.positions || []).map(x => POS_ABBR[x] || x).join(', ');
    return `<div class="player-card confirmed">
      <div class="player-avatar">${initials}</div>
      <div class="player-info">
        <div class="player-name">${esc(p.name)}</div>
        <div class="player-meta">${esc(posStr)} | OVR ${ovr}</div>
      </div>
      <div class="player-actions">
        <button class="icon-btn confirm confirmed" onclick="toggleConfirm('${p.id}')">&#10003;</button>
        <button class="icon-btn edit" onclick="editPlayer('${p.id}')">&#9998;</button>
      </div>
    </div>`;
  }).join('');
  updateConfirmedCount();
}

function updateConfirmedCount() {
  document.getElementById('confirmed-count').textContent = players.filter(p => p.confirmed).length;
}

// ---- MODAL ----
function openModal(player = null) {
  editingId = player ? player.id : null;
  document.getElementById('modal-title').textContent = player ? 'Editar Jogador' : 'Cadastrar Jogador';
  document.getElementById('inp-name').value = player ? player.name : '';
  document.getElementById('inp-phone').value = player ? (player.phone || '') : '';
  const grid = document.getElementById('pos-grid');
  grid.innerHTML = POSITIONS.map(pos =>
    `<div class="pos-chip ${player && player.positions?.includes(pos) ? 'selected' : ''}" data-pos="${pos}">${pos}</div>`
  ).join('');
  grid.querySelectorAll('.pos-chip').forEach(chip => {
    chip.addEventListener('click', () => chip.classList.toggle('selected'));
  });
  const sf = document.getElementById('skills-form');
  sf.innerHTML = SKILLS.map(s => {
    const val = player ? (player.skills?.[s.key] || 5) : 5;
    return `<div class="skill-row">
      <label>${s.label}</label>
      <input type="range" min="1" max="10" value="${val}" data-skill="${s.key}">
      <span class="skill-val">${val}</span>
    </div>`;
  }).join('');
  sf.querySelectorAll('input[type=range]').forEach(r => {
    r.addEventListener('input', () => r.nextElementSibling.textContent = r.value);
  });
  document.getElementById('modal').classList.add('show');
  setTimeout(() => document.getElementById('inp-name').focus(), 100);
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  editingId = null;
}

function savePlayer() {
  const name = document.getElementById('inp-name').value.trim();
  if (!name) { document.getElementById('inp-name').focus(); return; }
  const phone = document.getElementById('inp-phone').value.trim();
  const positions = [...document.querySelectorAll('#pos-grid .pos-chip.selected')].map(c => c.dataset.pos);
  const skills = {};
  document.querySelectorAll('#skills-form input[type=range]').forEach(r => {
    skills[r.dataset.skill] = parseInt(r.value);
  });
  if (editingId) {
    const p = players.find(x => x.id === editingId);
    if (p) { p.name = name; p.phone = phone; p.positions = positions; p.skills = skills; }
  } else {
    players.push({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
      name, phone, positions, skills, confirmed: false
    });
  }
  save(); closeModal(); renderPlayers();
}

function editPlayer(id) { const p = players.find(x => x.id === id); if (p) openModal(p); }

function deletePlayer(id) {
  if (!confirm('Excluir este jogador?')) return;
  players = players.filter(x => x.id !== id);
  save(); renderPlayers();
}

function toggleConfirm(id) {
  const p = players.find(x => x.id === id);
  if (p) { p.confirmed = !p.confirmed; save(); }
  renderPlayers(); renderConfirmed();
}

function confirmAll() { players.forEach(p => p.confirmed = true); save(); renderConfirmed(); renderPlayers(); }
function unconfirmAll() { players.forEach(p => p.confirmed = false); save(); renderConfirmed(); renderPlayers(); }

document.getElementById('search-input').addEventListener('input', e => renderPlayers(e.target.value));

// ---- CONFIG ----

// ---- TEAM GENERATION ----
function generateTeams() {
  const confirmed = players.filter(p => p.confirmed);
  const numTeams = config.numTeams;
  const perTeam = config.perTeam;

  if (confirmed.length < numTeams * 2) {
    alert(`Precisa de pelo menos ${numTeams * 2} jogadores confirmados!`);
    return;
  }

  const all = confirmed.map(p => ({...p, ovr: calcOverall(p), isBench: false}));

  // Shuffle for randomness
  for (let i = all.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [all[i], all[j]] = [all[j], all[i]];
  }

  const teams = Array.from({length: numTeams}, () => []);
  const teamPosCounts = Array.from({length: numTeams}, () => ({}));
  const assigned = new Set();

  function posCount(ti, pos) { return teamPosCounts[ti][pos] || 0; }
  function teamTotal(ti) { return teams[ti].filter(p => !p.isBench).reduce((s, p) => s + p.ovr, 0); }
  function teamStarters(ti) { return teams[ti].filter(p => !p.isBench).length; }

  // Phase 1: Assign by position — prefer 1 per team first, then fill up to limit
  POSITIONS.forEach(pos => {
    const limit = config.posLimits[pos] || 0;
    if (limit === 0) return;

    const candidates = all
      .filter(p => !assigned.has(p.id) && (p.positions || []).includes(pos))
      .sort((a, b) => b.ovr - a.ovr);

    for (let round = 0; round < limit; round++) {
      const teamOrder = Array.from({length: numTeams}, (_, i) => i)
        .filter(ti => teamStarters(ti) < perTeam && posCount(ti, pos) <= round)
        .sort((a, b) => teamTotal(a) - teamTotal(b));

      for (const ti of teamOrder) {
        if (posCount(ti, pos) > round) continue;
        const ci = candidates.findIndex(p => !assigned.has(p.id));
        if (ci === -1) break;
        const player = candidates[ci];
        player.assignedPos = pos;
        player.isBench = false;
        teams[ti].push(player);
        teamPosCounts[ti][pos] = (teamPosCounts[ti][pos] || 0) + 1;
        assigned.add(player.id);
        candidates.splice(ci, 1);
      }
    }
  });

  // Phase 2: Fill remaining starter slots with unassigned players
  const remaining = all.filter(p => !assigned.has(p.id)).sort((a, b) => b.ovr - a.ovr);

  for (const player of remaining) {
    const eligible = Array.from({length: numTeams}, (_, i) => i)
      .filter(ti => teamStarters(ti) < perTeam)
      .sort((a, b) => {
        if (teamStarters(a) !== teamStarters(b)) return teamStarters(a) - teamStarters(b);
        return teamTotal(a) - teamTotal(b);
      });

    if (eligible.length === 0) break;

    const ti = eligible[0];
    const playerPos = (player.positions || []);
    let bestPos = 'Linha';
    for (const pos of POSITIONS) {
      if (playerPos.includes(pos) && posCount(ti, pos) < (config.posLimits[pos] || 0)) {
        bestPos = pos;
        break;
      }
    }
    player.assignedPos = bestPos;
    player.isBench = false;
    teams[ti].push(player);
    if (bestPos !== 'Linha') teamPosCounts[ti][bestPos] = (teamPosCounts[ti][bestPos] || 0) + 1;
    assigned.add(player.id);
  }

  // Phase 3: Remaining players go to bench — distribute evenly across teams
  // Sort remaining by ovr ASC so weaker players go to bench first (avoid best on bench)
  const benchPlayers = all.filter(p => !assigned.has(p.id)).sort((a, b) => a.ovr - b.ovr);

  // Shuffle the bottom half to add randomness to who goes to bench
  // but keep top players out of bench
  const midpoint = Math.floor(benchPlayers.length / 2);
  for (let i = midpoint; i < benchPlayers.length; i++) {
    const j = midpoint + Math.floor(Math.random() * (benchPlayers.length - midpoint));
    [benchPlayers[i], benchPlayers[j]] = [benchPlayers[j], benchPlayers[i]];
  }

  for (const player of benchPlayers) {
    // Put on team with fewest bench players, then fewest total
    const teamOrder = Array.from({length: numTeams}, (_, i) => i)
      .sort((a, b) => {
        const benchA = teams[a].filter(p => p.isBench).length;
        const benchB = teams[b].filter(p => p.isBench).length;
        if (benchA !== benchB) return benchA - benchB;
        return teams[a].length - teams[b].length;
      });
    const ti = teamOrder[0];
    player.assignedPos = 'BANCO';
    player.isBench = true;
    teams[ti].push(player);
  }

  // Phase 4: Optimize balance — swap starters between teams to equalize totals
  for (let attempt = 0; attempt < 2000; attempt++) {
    let maxTi = 0, minTi = 0;
    for (let i = 1; i < numTeams; i++) {
      if (teamTotal(i) > teamTotal(maxTi)) maxTi = i;
      if (teamTotal(i) < teamTotal(minTi)) minTi = i;
    }
    if (maxTi === minTi) break;
    const diff = teamTotal(maxTi) - teamTotal(minTi);
    if (diff <= 1) break;

    const startersMax = teams[maxTi].filter(p => !p.isBench);
    const startersMin = teams[minTi].filter(p => !p.isBench);

    let bestSwap = null;
    let bestImprovement = 0;

    for (const p1 of startersMax) {
      for (const p2 of startersMin) {
        const pos1 = p1.assignedPos;
        const pos2 = p2.assignedPos;

        let canSwap = false;
        if (pos1 === pos2) {
          canSwap = true;
        } else {
          const p1canPos2 = pos2 === 'Linha' || (p1.positions || []).includes(pos2);
          const p2canPos1 = pos1 === 'Linha' || (p2.positions || []).includes(pos1);
          canSwap = p1canPos2 && p2canPos1;
        }
        if (!canSwap) continue;

        const ovrDiff = p1.ovr - p2.ovr;
        if (ovrDiff <= 0) continue;

        const newDiff = Math.abs((teamTotal(maxTi) - 2 * ovrDiff) + (p2.ovr - p1.ovr) + diff);
        const actualNewDiff = Math.abs((teamTotal(maxTi) - ovrDiff) - (teamTotal(minTi) + ovrDiff));
        const improvement = diff - actualNewDiff;

        if (improvement > bestImprovement) {
          bestImprovement = improvement;
          bestSwap = { p1, p2, pos1, pos2 };
        }
      }
    }

    if (!bestSwap || bestImprovement <= 0) break;

    const { p1, p2, pos1, pos2 } = bestSwap;
    const i1 = teams[maxTi].indexOf(p1);
    const i2 = teams[minTi].indexOf(p2);
    [teams[maxTi][i1], teams[minTi][i2]] = [teams[minTi][i2], teams[maxTi][i1]];
    teams[maxTi][i1].assignedPos = pos1;
    teams[minTi][i2].assignedPos = pos2;
  }

  // Sort players: starters by position order, then bench at end
  teams.forEach(team => {
    team.sort((a, b) => {
      if (a.isBench !== b.isBench) return a.isBench ? 1 : -1;
      return (POS_ORDER[a.assignedPos] ?? 50) - (POS_ORDER[b.assignedPos] ?? 50);
    });
  });

  lastTeams = teams;
  renderTeams(teams);
}

const TEAM_COLORS = ['#e94560','#2ecc71','#3498db','#f39c12','#9b59b6','#1abc9c','#e67e22','#e74c3c'];
const TEAM_NAMES = ['Vermelho','Verde','Azul','Amarelo','Roxo','Turquesa','Laranja','Rubro'];

function renderTeams(teams) {
  const display = document.getElementById('teams-display');
  let html = teams.map((team, idx) => {
    const starters = team.filter(p => !p.isBench);
    const bench = team.filter(p => p.isBench);
    const total = starters.reduce((s, p) => s + p.ovr, 0);

    let playersHtml = starters.map(p => {
      const abbr = POS_ABBR[p.assignedPos] || p.assignedPos;
      return `<div class="team-player">
        <span><span class="team-player-pos">${esc(abbr)}</span> ${esc(p.name)}</span>
        <span class="team-player-rating">${p.ovr}</span>
      </div>`;
    }).join('');

    if (bench.length > 0) {
      playersHtml += `<hr class="team-separator">`;
      playersHtml += bench.map(p => {
        return `<div class="team-player bench">
          <span><span class="team-player-pos">BANCO</span> ${esc(p.name)}</span>
          <span class="team-player-rating">${p.ovr}</span>
        </div>`;
      }).join('');
    }

    return `<div class="team-block" style="border-left:4px solid ${TEAM_COLORS[idx]}">
      <div class="team-header">
        <span class="team-title" style="color:${TEAM_COLORS[idx]}">Time ${TEAM_NAMES[idx]}</span>
        <span class="team-overall">${starters.length} tit | Total ${total}</span>
      </div>
      ${playersHtml}
    </div>`;
  }).join('');

  display.innerHTML = html;
  document.getElementById('btn-reshuffle').style.display = 'block';
  document.getElementById('btn-copy').style.display = 'block';
}

// ---- COPY TO WHATSAPP ----
function copyTeams() {
  if (!lastTeams) return;
  let text = '*TIMES DA PELADA*\n\n';
  lastTeams.forEach((team, idx) => {
    const starters = team.filter(p => !p.isBench);
    const bench = team.filter(p => p.isBench);
    const total = starters.reduce((s, p) => s + p.ovr, 0);
    text += `*Time ${TEAM_NAMES[idx]}* (${starters.length} titulares | Total: ${total})\n`;
    let n = 1;
    starters.forEach(p => {
      const abbr = POS_ABBR[p.assignedPos] || p.assignedPos;
      text += `${n++}. ${abbr} - ${p.name}\n`;
    });
    if (bench.length > 0) {
      text += `_Banco:_\n`;
      bench.forEach(p => {
        text += `${n++}. BANCO - ${p.name}\n`;
      });
    }
    text += '\n';
  });

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast('Copiado!')).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  showToast('Copiado!');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

  else if (v.length > 0) v = `(${v}`;

});
